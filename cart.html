<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Your Cart - Rainbow Clouds</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    .shipping-section {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .shipping-section label {
      font-weight: 700;
      color: #311b92;
      margin-bottom: 8px;
      display: block;
    }

    .shipping-section select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 16px;
      margin-bottom: 15px;
    }

    .totals-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 16px;
    }

    .totals-row.grand-total {
      font-size: 20px;
      font-weight: 800;
      border-top: 2px solid #eee;
      padding-top: 15px;
      margin-top: 10px;
    }

    .shipping-note {
      font-size: 13px;
      color: #888;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="brand-group">
        <div class="brand-logo">
          <img src="./assets/images/logo.png" alt="Rainbow Clouds Logo">
        </div>
        <div class="brand-text">
          <div class="brand-title">Rainbow Clouds</div>
          <div class="small">Joy, Celebration & Sweetness</div>
        </div>
      </div>

      <nav class="nav">
        <a href="index.html" class="nav-image-button">
          <div class="nav-image-wrapper">
            <img src="assets/images/flavors.png" class="nav-image-icon" alt="Flavors">
            <div class="nav-image-label">Flavors</div>
          </div>
        </a>

        <a href="label.html" class="nav-image-button">
          <div class="nav-image-wrapper">
            <img src="assets/images/label.png" class="nav-image-icon" alt="Labels">
            <div class="nav-image-label">Labels</div>
          </div>
        </a>

        <a href="catering.html" class="nav-image-button">
          <div class="nav-image-wrapper">
            <img src="assets/images/catering.png" class="nav-image-icon" alt="Catering">
            <div class="nav-image-label">Catering</div>
          </div>
        </a>

        <a href="cart.html" class="nav-image-button">
          <div class="nav-image-wrapper cart-wrapper">
            <img src="assets/images/sc.png" class="nav-image-icon" alt="Cart">
            <div class="nav-image-label">Cart</div>
            <span id="cart-count" class="cart-count hidden">0</span>
          </div>
        </a>
      </nav>
    </div>
  </header>


  <div class="container">
    <h1>Your Cart</h1>
    <p class="small">Review your sweet selections</p>

    <!-- Cart Items Render Here -->
    <div id="cart-items" class="cart-list"></div>

    <!-- Shipping Section -->
    <div id="shipping-section" class="shipping-section" style="display: none;">
      <label for="shipping-state">Select Your State for Shipping</label>
      <select id="shipping-state">
        <option value="">-- Select State --</option>
        <option value="TX">Texas (TX) - $5</option>
        <option value="LA">Louisiana (LA) - $8</option>
        <option value="OK">Oklahoma (OK) - $8</option>
        <option value="AR">Arkansas (AR) - $8</option>
        <option value="NM">New Mexico (NM) - $8</option>
        <option value="CO">Colorado (CO) - $10</option>
        <option value="KS">Kansas (KS) - $10</option>
        <option value="MO">Missouri (MO) - $10</option>
        <option value="NE">Nebraska (NE) - $10</option>
        <option value="IA">Iowa (IA) - $10</option>
        <option value="MN">Minnesota (MN) - $10</option>
        <option value="WI">Wisconsin (WI) - $10</option>
        <option value="IL">Illinois (IL) - $10</option>
        <option value="IN">Indiana (IN) - $10</option>
        <option value="OH">Ohio (OH) - $10</option>
        <option value="MI">Michigan (MI) - $10</option>
        <option value="CA">California (CA) - $12</option>
        <option value="WA">Washington (WA) - $12</option>
        <option value="OR">Oregon (OR) - $12</option>
        <option value="AZ">Arizona (AZ) - $12</option>
        <option value="NV">Nevada (NV) - $12</option>
        <option value="UT">Utah (UT) - $12</option>
        <option value="NY">New York (NY) - $12</option>
        <option value="PA">Pennsylvania (PA) - $12</option>
        <option value="NJ">New Jersey (NJ) - $12</option>
        <option value="MA">Massachusetts (MA) - $12</option>
        <option value="CT">Connecticut (CT) - $12</option>
        <option value="FL">Florida (FL) - $12</option>
        <option value="GA">Georgia (GA) - $12</option>
        <option value="NC">North Carolina (NC) - $12</option>
        <option value="SC">South Carolina (SC) - $12</option>
        <option value="VA">Virginia (VA) - $12</option>
        <option value="MD">Maryland (MD) - $12</option>
        <option value="TN">Tennessee (TN) - $10</option>
        <option value="KY">Kentucky (KY) - $10</option>
        <option value="AL">Alabama (AL) - $10</option>
        <option value="MS">Mississippi (MS) - $8</option>
        <option value="AK">Alaska (AK) - $18</option>
        <option value="HI">Hawaii (HI) - $18</option>
      </select>

      <div class="totals-row">
        <span>Subtotal:</span>
        <span id="subtotal-display">$0.00</span>
      </div>
      <div class="totals-row">
        <span>Shipping:</span>
        <span id="shipping-display">$0.00</span>
      </div>
      <div class="totals-row grand-total">
        <span>Total:</span>
        <span id="grand-total-display">$0.00</span>
      </div>
      <p class="shipping-note">Shipping rates vary by location. Faster shipping available upon request.</p>
    </div>

    <div id="cart-total" class="cart-total"></div>

    <button id="checkout-btn" class="checkout-btn">Checkout</button>
  </div>

  <div class="footer">
    <div class="small">Rainbow Clouds - Where Sweet Dreams Come True.</div>
  </div>

  <script src="assets/js/main.js"></script>

</body>

</html>
