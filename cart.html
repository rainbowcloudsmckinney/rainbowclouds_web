<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Your Cart - Rainbow Clouds</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    .shipping-section {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .shipping-section label {
      font-weight: 700;
      color: #311b92;
      margin-bottom: 8px;
      display: block;
    }

    .shipping-section select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 16px;
      margin-bottom: 15px;
    }

    .totals-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 16px;
    }

    .totals-row.grand-total {
      font-size: 20px;
      font-weight: 800;
      border-top: 2px solid #eee;
      padding-top: 15px;
      margin-top: 10px;
    }

    .shipping-note {
      font-size: 13px;
      color: #888;
      margin-top: 5px;
    }

    .min-order-msg {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
    }

    .min-order-msg.warning {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
    }

    .min-order-msg.ok {
      background: #d4edda;
      color: #155724;
      border: 1px solid #28a745;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="brand-group">
        <div class="brand-logo">
          <img src="./assets/images/logo.png" alt="Rainbow Clouds Logo">
        </div>
        <div class="brand-text">
          <div class="brand-title">Rainbow Clouds</div>
          <div class="small">Joy, Celebration & Sweetness</div>
        </div>
      </div>

      <nav class="nav">
        <a href="index.html" class="nav-image-button">
          <div class="nav-image-wrapper">
            <img src="assets/images/flavors.png" class="nav-image-icon" alt="Flavors">
            <div class="nav-image-label">Flavors</div>
          </div>
        </a>

        <a href="label.html" class="nav-image-button">
          <div class="nav-image-wrapper">
            <img src="assets/images/label.png" class="nav-image-icon" alt="Labels">
            <div class="nav-image-label">Labels</div>
          </div>
        </a>

        <a href="catering.html" class="nav-image-button">
          <div class="nav-image-wrapper">
            <img src="assets/images/catering.png" class="nav-image-icon" alt="Catering">
            <div class="nav-image-label">Catering</div>
          </div>
        </a>

        <a href="cart.html" class="nav-image-button">
          <div class="nav-image-wrapper cart-wrapper">
            <img src="assets/images/sc.png" class="nav-image-icon" alt="Cart">
            <div class="nav-image-label">Cart</div>
            <span id="cart-count" class="cart-count hidden">0</span>
          </div>
        </a>
      </nav>
    </div>
  </header>


  <div class="container">
    <h1>Your Cart</h1>
    <p class="small">Review your sweet selections</p>

    <!-- Cart Items Render Here -->
    <div id="cart-items" class="cart-list"></div>

    <!-- Shipping Section -->
    <div id="shipping-section" class="shipping-section" style="display: none;">
      <div class="totals-row">
        <span>Subtotal:</span>
        <span id="subtotal-display">$0.00</span>
      </div>
      <div class="totals-row">
        <span>Shipping:</span>
        <span id="shipping-display">$15.00</span>
      </div>
      <div class="totals-row grand-total">
        <span>Total:</span>
        <span id="grand-total-display">$0.00</span>
      </div>
      <p class="shipping-note">Standard shipping — $15 flat rate across the US.</p>
    </div>

    <div id="cart-total" class="cart-total"></div>

    <div id="min-order-msg" class="min-order-msg" style="display: none;"></div>

    <button id="checkout-btn" class="checkout-btn">Checkout</button>
  </div>

  <div class="footer">
    <div class="small">Rainbow Clouds - Where Sweet Dreams Come True.</div>
  </div>

  <script src="assets/js/main.js"></script>

</body>

</html>
