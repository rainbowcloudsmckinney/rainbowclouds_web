<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Order Confirmed - Rainbow Clouds</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <style>
        .success-container {
            text-align: center;
            padding: 60px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .success-container h1 {
            color: #2e7d32;
            margin-bottom: 10px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 28px;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
        }

        .back-btn:hover {
            background: #e63b5a;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-inner">
            <div class="brand-group">
                <div class="brand-logo">
                    <img src="./assets/images/logo.png" alt="Rainbow Clouds Logo">
                </div>
                <div class="brand-text">
                    <div class="brand-title">Rainbow Clouds</div>
                    <div class="small">Joy, Celebration & Sweetness</div>
                </div>
            </div>

            <nav class="nav">
                <a href="index.html" class="nav-image-button">
                    <div class="nav-image-wrapper">
                        <img src="assets/images/flavors.png" class="nav-image-icon" alt="Flavors">
                        <div class="nav-image-label">Flavors</div>
                    </div>
                </a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="success-container">
            <div class="success-icon">🎉</div>
            <h1>Thank You for Your Order!</h1>
            <p class="small">Your payment was successful. We'll start preparing your delicious cotton candy right away!
            </p>
            <p class="small">A confirmation email will be sent to you shortly.</p>
            <a href="index.html" class="back-btn">Continue Shopping</a>
        </div>
    </main>

    <footer class="footer">
        <div class="small">Rainbow Clouds - Where Sweet Dreams Come True.</div>
    </footer>

    <script>
        // Clear cart after successful payment
        localStorage.removeItem("cart");
    </script>

</body>

</html>
